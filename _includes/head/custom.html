<style>
  /* Override the main background and text colors */
  html.dark-mode, 
  html.dark-mode body {
    background-color: #121212 !important;
    color: #e0e0e0 !important;
  }

  /* Fix the top navigation bar */
  html.dark-mode .masthead {
    background-color: #1a1a1a !important;
    border-bottom: 1px solid #333 !important;
  }
  
  html.dark-mode .masthead__menu-item a {
    color: #e0e0e0 !important;
  }

  /* Fix Headings */
  html.dark-mode .page__title, 
  html.dark-mode h1, 
  html.dark-mode h2, 
  html.dark-mode h3, 
  html.dark-mode h4, 
  html.dark-mode strong {
    color: #ffffff !important;
  }

  /* Fix inputs, dropdowns, and text areas */
  html.dark-mode input[type="range"],
  html.dark-mode input[type="checkbox"],
  html.dark-mode select, 
  html.dark-mode textarea {
    background-color: #333 !important;
    color: #fff !important;
    border: 1px solid #555 !important;
  }

  /* Target the inline styles of the history log boxes */
  html.dark-mode #logList > div > div {
    background-color: #2a2a2a !important;
    color: #e0e0e0 !important;
  }

  /* The Floating Button CSS */
  #darkModeToggle {
    position: fixed; 
    bottom: 20px; 
    right: 20px; 
    z-index: 9999; 
    background: #222; 
    color: #ffd700; 
    border: 2px solid #444; 
    border-radius: 50%; 
    width: 50px; 
    height: 50px; 
    font-size: 24px; 
    cursor: pointer; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
  }
  
  #darkModeToggle:hover {
    transform: scale(1.1);
  }
</style>

<div id="motivationalBanner" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background-color: #2b2b2b; color: #ffffff; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; z-index: 9999; box-shadow: 0 -4px 6px rgba(0,0,0,0.3);">
  <span id="quoteText"></span>
  <button onclick="document.getElementById('motivationalBanner').style.display='none'" style="float: right; margin-right: 20px; background: none; border: none; color: #ffffff; font-size: 16px; cursor: pointer;">✖</button>
</div>

<script>
// --- GLOBAL UI: DARK MODE & MOTIVATIONAL BANNER ---
document.addEventListener("DOMContentLoaded", function() {
  
  // ==========================================
  // 1. Setup Dark Mode Button
  // ==========================================
  const btn = document.createElement("button");
  btn.id = "darkModeToggle";
  
  // FORCE THE BUTTON TO FLOAT ABOVE THE BANNER
  btn.style.cssText = "position: fixed; bottom: 60px; right: 20px; z-index: 10000; font-size: 28px; background: none; border: none; cursor: pointer; text-shadow: 0px 2px 4px rgba(0,0,0,0.3);";
  
  function toggleDarkMode() {
    const htmlEl = document.documentElement;
    if (htmlEl.classList.contains("dark-mode")) {
      htmlEl.classList.remove("dark-mode");
      btn.innerText = "🌙"; 
      localStorage.setItem("theme", "light");
    } else {
      htmlEl.classList.add("dark-mode");
      btn.innerText = "☀️"; 
      localStorage.setItem("theme", "dark");
    }
  }
  
  btn.onclick = toggleDarkMode;
  
  // Check local storage to maintain the theme across pages
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark-mode");
    btn.innerText = "☀️";
  } else {
    btn.innerText = "🌙";
  }
  
  // Stick the button onto the page
  document.body.appendChild(btn);

  // ==========================================
  // 2. Setup Motivational Banner
  // ==========================================
  const quotes = [
    "you are doing better than you think.",
    "one step at a time.",
    "take a deep breath. you got this.",
    "progress, not perfection.",
    "your feelings are valid.",
    "every day is a fresh start.",
    "be kind to your mind.",
    "small steps are still steps.",
    "it's okay to take a break."
  ];

  // PICK A RANDOM QUOTE ON EVERY REFRESH
  const randomIndex = Math.floor(Math.random() * quotes.length);
  
  // Build the banner container
  const bannerDiv = document.createElement("div");
  bannerDiv.id = "motivationalBanner";
  bannerDiv.style.cssText = "position: fixed; bottom: 0; left: 0; width: 100%; background-color: #2b2b2b; color: #ffffff; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; z-index: 9999; box-shadow: 0 -4px 6px rgba(0,0,0,0.3);";
  
  // Build the text
  const textSpan = document.createElement("span");
  textSpan.innerText = quotes[randomIndex]; // Uses the random number here
  
  // Build the close button
  const closeBtn = document.createElement("button");
  closeBtn.innerText = "✖";
  closeBtn.style.cssText = "float: right; margin-right: 20px; background: none; border: none; color: #ffffff; font-size: 16px; cursor: pointer;";
  closeBtn.onclick = function() {
    bannerDiv.style.display = "none";
  };

  // Put it all together and shove it into the page
  bannerDiv.appendChild(textSpan);
  bannerDiv.appendChild(closeBtn);
  document.body.appendChild(bannerDiv);
});
</script>

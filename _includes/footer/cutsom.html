<button id="darkModeToggle" onclick="toggleDarkMode()" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: #333; color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
  🌙
</button>

<style>
  /* The magic CSS that creates dark mode instantly */
  html.dark-mode {
    filter: invert(1) hue-rotate(180deg);
    background-color: #111;
  }
  /* Re-invert images and canvases (like your chart) so they don't look weird */
  html.dark-mode img, 
  html.dark-mode canvas,
  html.dark-mode .void-container {
    filter: invert(1) hue-rotate(180deg);
  }
</style>

<script>
  function toggleDarkMode() {
    const htmlEl = document.documentElement;
    const btn = document.getElementById("darkModeToggle");
    
    if (htmlEl.classList.contains("dark-mode")) {
      htmlEl.classList.remove("dark-mode");
      btn.innerText = "🌙";
      localStorage.setItem("theme", "light");
    } else {
      htmlEl.classList.add("dark-mode");
      btn.innerText = "☀️";
      localStorage.setItem("theme", "dark");
    }
  }

  // Check user's saved preference when the page loads
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark-mode");
    document.getElementById("darkModeToggle").innerText = "☀️";
  }
</script>
